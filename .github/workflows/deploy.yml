name: "Production Delivery Pipeline"
on:
  push:
    branches:
      - main

jobs:
  quality-gate:
    name: "Lints & Code Quality"
    runs-on: ubuntu-latest
    outputs:
      duration: ${{ steps.timer.outputs.duration }}
    steps:
      - id: start
        run: echo "start=$(date +%s)" >> "$GITHUB_OUTPUT"
      - uses: actions/checkout@v5
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          python-version: "3.12"
      - name: Code Verification
        run: |
          uvx ruff check .
          uvx ruff format --check .
      - id: timer
        if: always()
        run: |
          END=$(date +%s)
          START=${{ steps.start.outputs.start }}
          echo "duration=$((END - START))s" >> "$GITHUB_OUTPUT"

  deploy:
    name: "Production Deployment"
    needs: quality-gate
    runs-on: ubuntu-latest
    outputs:
      duration: ${{ steps.timer.outputs.duration }}
    steps:
      - id: start
        run: echo "start=$(date +%s)" >> "$GITHUB_OUTPUT"
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          python-version: "3.12"
      - name: Deploy to FastAPI Cloud
        run: uvx --from "fastapi[standard]" fastapi deploy
        env:
          FASTAPI_CLOUD_TOKEN: ${{ secrets.FASTAPI_CLOUD_TOKEN }}
          FASTAPI_CLOUD_APP_ID: ${{ secrets.FASTAPI_CLOUD_APP_ID }}
      - id: timer
        if: always()
        run: |
          END=$(date +%s)
          START=${{ steps.start.outputs.start }}
          echo "duration=$((END - START))s" >> "$GITHUB_OUTPUT"

  notify:
    name: "Telegram Notification"
    needs: [quality-gate, deploy]
    runs-on: ubuntu-latest
    if: always()
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v5

      - name: Derive dynamic context
        id: context
        run: |
          # project = repo name, pulled straight from github context
          PROJECT_NAME="${{ github.event.repository.name }}"

          # map branch name to environment label dynamically
          BRANCH="${{ github.ref_name }}"
          case "$BRANCH" in
            main|master) ENVIRONMENT="Production" ;;
            uat) ENVIRONMENT="UAT" ;;
            staging) ENVIRONMENT="Staging" ;;
            dev|develop) ENVIRONMENT="Development" ;;
            *) ENVIRONMENT="$BRANCH" ;;
          esac

          echo "project_name=$PROJECT_NAME" >> "$GITHUB_OUTPUT"
          echo "environment=$ENVIRONMENT" >> "$GITHUB_OUTPUT"

      - name: Set overall status
        id: status
        run: |
          if [ "${{ needs.quality-gate.result }}" = "success" ] && [ "${{ needs.deploy.result }}" = "success" ]; then
            echo "overall=🎉" >> "$GITHUB_OUTPUT"
          else
            echo "overall=🚨" >> "$GITHUB_OUTPUT"
          fi

      - name: Fetch committer avatar
        id: avatar
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          COMMIT_JSON=$(curl -s -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/commits/${{ github.sha }}")

          # GitHub links the commit to a real account only if the commit email matches one;
          # falls back to empty if the committer has no linked GitHub account (e.g. bots, unlinked email)
          AVATAR_URL=$(echo "$COMMIT_JSON" | jq -r '.author.avatar_url // .committer.avatar_url // empty')

          if [ -n "$AVATAR_URL" ] && [ "$AVATAR_URL" != "null" ]; then
            curl -sL "$AVATAR_URL" -o avatar.png || true
          fi

          if [ -s avatar.png ] 2>/dev/null; then
            echo "path=avatar.png" >> "$GITHUB_OUTPUT"
          else
            echo "path=" >> "$GITHUB_OUTPUT"
          fi

      - name: Install Pillow
        run: pip install --break-system-packages --quiet pillow

      - name: Generate status card image
        env:
          OVERALL_OK: ${{ needs.quality-gate.result == 'success' && needs.deploy.result == 'success' }}
          PROJECT: ${{ steps.context.outputs.project_name }}
          ENVIRONMENT: ${{ steps.context.outputs.environment }}
          BRANCH: ${{ github.ref_name }}
          AUTHOR: ${{ github.event.head_commit.author.name }}
          COMMIT_MSG: ${{ github.event.head_commit.message }}
          LINT_RESULT: ${{ needs.quality-gate.result }}
          LINT_DURATION: ${{ needs.quality-gate.outputs.duration }}
          DEPLOY_RESULT: ${{ needs.deploy.result }}
          DEPLOY_DURATION: ${{ needs.deploy.outputs.duration }}
          AVATAR_PATH: ${{ steps.avatar.outputs.path }}
        run: |
          export SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          export COMMIT_MSG=$(echo "$COMMIT_MSG" | head -n1)
          export TIMESTAMP="$(date -u '+%d-%b-%Y | %I:%M %p') UTC"
          python3 .github/scripts/make_card.py

      - name: Send Telegram photo
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          CAPTION="${{ steps.status.outputs.overall }} *${{ steps.context.outputs.project_name }}* build finished — [View run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})"

          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendPhoto" \
            -F chat_id="${TELEGRAM_CHAT_ID}" \
            -F parse_mode="Markdown" \
            -F caption="${CAPTION}" \
            -F photo=@card.png
