<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<title>PO Dashboard</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="progress-bar"><div id="progress-bar-fill"></div></div>

  <!-- Single, always-visible control bar. Fixed position so it never collides with tabs or header. -->
  <div id="app-controls">
    <button id="lang-toggle" class="icon-btn" title="Language">EN</button>
    <button id="theme-toggle" class="icon-btn" title="Theme">🌙</button>
  </div>

  <div id="app">
    <header id="user-header" class="user-header hidden">
      <img id="user-avatar" class="user-avatar hidden" alt="" />
      <div class="user-header-text">
        <div class="user-greeting" id="user-greeting"></div>
        <div class="user-sub" id="user-sub">Purchase order dashboard</div>
      </div>
    </header>

    <nav class="tabbar">
      <button class="tab active" data-tab="dashboard">
        <span class="tab-icon">📊</span><span data-i18n="tab_dashboard">Dashboard</span>
      </button>
      <button class="tab" data-tab="history">
        <span class="tab-icon">🗂️</span><span data-i18n="tab_history">History</span>
      </button>
    </nav>

    <main>
      <section id="tab-dashboard" class="tab-panel active">
        <div id="stats" class="stats-grid"></div>
        <h2 class="section-title" data-i18n="recent_orders">Recent Orders</h2>
        <div id="recent-list" class="po-list"></div>
      </section>

      <section id="tab-history" class="tab-panel">
        <div class="filters" id="status-filters">
          <button class="chip active" data-status="" data-i18n="filter_all">All</button>
          <button class="chip" data-status="pending">⏳ <span data-i18n="status_pending">Pending</span></button>
          <button class="chip" data-status="dispatched">🚀 <span data-i18n="status_dispatched">In Progress</span></button>
          <button class="chip" data-status="completed">✅ <span data-i18n="status_completed">Completed</span></button>
          <button class="chip" data-status="failed">❌ <span data-i18n="status_failed">Failed</span></button>
        </div>
        <div id="history-list" class="po-list"></div>
        <div id="history-pager" class="pager"></div>
      </section>
    </main>
  </div>

  <div id="detail-sheet" class="sheet hidden">
    <div class="sheet-backdrop"></div>
    <div class="sheet-content">
      <div class="sheet-handle"></div>
      <button id="sheet-close" class="sheet-close">✕</button>
      <div id="sheet-body"></div>
    </div>
  </div>

  <div id="toast" class="toast hidden"></div>

  <script src="app.js"></script>
</body>
</html>
